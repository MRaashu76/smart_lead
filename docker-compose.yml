version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: sl-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: smart-leads
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    networks:
      - sl-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sl-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/smart-leads
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      CORS_ORIGIN: http://localhost
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    ports:
      - '5000:5000'
    depends_on:
      - mongo
    networks:
      - sl-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sl-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - sl-network

volumes:
  mongo_data:

networks:
  sl-network:
    driver: bridge
